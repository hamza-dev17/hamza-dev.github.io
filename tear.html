<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holographic Celestial Gate</title>
    
    <style>
        body { margin:0; overflow:hidden; background:#050510; font-family:Segoe UI, sans-serif; }
        canvas { display:block; }
        #ui{
            position:absolute; top:20px; left:20px;
            color:white; pointer-events:none;
            text-shadow:0 0 15px rgba(0,0,0,1);
        }
        h1{ margin:0; font-weight:300; letter-spacing:4px;}
        span{ color:#00ffff; text-shadow:0 0 20px #00ffff;}
        p{ opacity:0.7;}
        video{ display:none;}
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>

    <div id="ui">
        <h1>CELESTIAL <span>GATE</span></h1>
        <p>Open your hand to energize the portal.</p>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Double buffering for fluid simulation
        const simParams = {
            resolution: 128,
            boundaryDamping: 0.98,
        };
